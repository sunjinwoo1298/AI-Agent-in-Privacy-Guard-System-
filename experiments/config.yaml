# Experiment configuration for deterministic multi-agent privacy pipeline

n_values: [1, 2, 4, 6, 8, 12, 16]
runs_per_n: 5

dataset:
  preset: small    # small | medium | large or specify sample_count below
  sample_count: 10
  tokens_per_sample: 50
  entity_density: 0.05

iou_threshold: 0.5
use_spacy: false
use_process_pool: false
seed: 42
results_csv: results/logs.csv
